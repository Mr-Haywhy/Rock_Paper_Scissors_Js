<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="script.js" defer></script>
    <title>Rock_Paper_Scissors Game</title>
    <style>
      body {
        font-family: sans-serif;
        font-size: x-large;
        background-color: #aff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      button {
        padding: 20;
        font-weight: 800;
        height: 30px;
        width: 100px;
      }
    </style>
  </head>
  <body>
    <p>You don't need to open the console to play the game</p>
    <button id="start-btn">Start Game</button>

    <div
      id="game-log"
      style="
        background: #222;
        color: #fff;
        padding: 10px;
        margin-top: 10px;
        min-height: 100px;
        min-width: 600px;
        white-space: pre-line;
        text-align: center;
      "
    >
      Game Logs will appear here.....
    </div>
  </body>
</html>
